<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>モダンな画像カルーセル</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .carousel {
      position: relative;
      width: 1200px;
      overflow: hidden;
    }
    .carousel-inner {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }
    .carousel-item {
      min-width: 100%;
    }
    .carousel-item img {
      width: 100%;
      display: block;
    }
    .carousel-control {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.2);
      color: #fff;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 50%;
      font-size: 16px;
      outline: none;
    }
    .carousel-control.prev {
      left: 10px;
    }
    .carousel-control.next {
      right: 10px;
    }
    /* 矢印ボタン：HTML内のテキストは削除し、疑似要素で「<」「>」を表示 */
    .carousel-control.prev::after {
      content: "＜";
    }
    .carousel-control.next::after {
      content: "＞";
    }
    /* ドット（インジケーター）のスタイル */
    .carousel-dots {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
    }
    .carousel-dot {
      width: 10px;
      height: 10px;
      background-color: #ccc;
      border-radius: 50%;
      margin: 0 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .carousel-dot.active {
      background-color: #333;
    }
  </style>
</head>
<body>

<div class="carousel">
  <div class="carousel-inner">
    <div class="carousel-item">
      <img src="./voxel_exs/voxel_examples_1.png" alt="Slide 1">
    </div>
    <div class="carousel-item">
      <img src="./voxel_exs/voxel_examples_2.png" alt="Slide 2">
    </div>
    <div class="carousel-item">
      <img src="./voxel_exs/voxel_examples_3.png" alt="Slide 3">
    </div>
    <div class="carousel-item">
      <img src="./voxel_exs/voxel_examples_4.png" alt="Slide 4">
    </div>
    <div class="carousel-item">
      <img src="./voxel_exs/voxel_examples_5.png" alt="Slide 5">
    </div>
    <div class="carousel-item">
      <img src="./voxel_exs/voxel_examples_6.png" alt="Slide 6">
    </div>
  </div>
  <button class="carousel-control prev"></button>
  <button class="carousel-control next"></button>
  <!-- ドットインジケーターをカルーセル内下部中央に配置 -->
  <div class="carousel-dots"></div>
</div>

<script>
  const carouselInner = document.querySelector('.carousel-inner');
  const carouselItems = document.querySelectorAll('.carousel-item');
  const prevBtn = document.querySelector('.carousel-control.prev');
  const nextBtn = document.querySelector('.carousel-control.next');
  const dotsContainer = document.querySelector('.carousel-dots');
  let currentIndex = 0;
  const totalItems = carouselItems.length;
  const dots = [];
  
  // ドットを動的に作成
  for (let i = 0; i < totalItems; i++) {
    const dot = document.createElement('span');
    dot.classList.add('carousel-dot');
    if (i === 0) {
      dot.classList.add('active');
    }
    dot.addEventListener('click', () => {
      currentIndex = i;
      updateCarousel();
    });
    dotsContainer.appendChild(dot);
    dots.push(dot);
  }
  
  function updateCarousel() {
    carouselInner.style.transform = `translateX(-${currentIndex * 100}%)`;
    // アクティブなドットの更新
    dots.forEach((dot, index) => {
      dot.classList.toggle('active', index === currentIndex);
    });
  }
  
  prevBtn.addEventListener('click', () => {
    currentIndex = (currentIndex === 0) ? totalItems - 1 : currentIndex - 1;
    updateCarousel();
  });
  
  nextBtn.addEventListener('click', () => {
    currentIndex = (currentIndex === totalItems - 1) ? 0 : currentIndex + 1;
    updateCarousel();
  });
</script>

</body>
</html>
