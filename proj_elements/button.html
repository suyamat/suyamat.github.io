<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背景画像とタイトル付きボタン表示例</title>
  <!-- Bulma CSS（ボタンスタイル用） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <!-- Font Awesome（アイコン用） -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
  <!-- Google Fonts（Merriweather Bold Italic） -->
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@1,700&display=swap" rel="stylesheet">
  <style>
    /* CSS変数で各種スタイルを管理 */
    :root {
      /* ボタン用 */
      --btn-border-radius: 20px;
      --btn-border-color: #e74300;
      --btn-bg-color: #e75480;
      --btn-text-color: #fff;
      --btn-hover-bg-color: rgba(74,144,226,0.1);
      --btn-hover-border-color: #e74300;
      
    }

    /* html, bodyの基本サイズ設定 */
    /* html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    } */

    /* 独自スタイル：ボタン間の余白 */
    .btn-cluster {
      text-align: center;
      margin: 1em 0;
      background-color: transparent;
    }
    .btn-cluster a {
      margin: 0 20px;
    }

    /* ボタンのスタイル設定 */
    .button {
      border-radius: var(--btn-border-radius);
      border: 2px solid var(--btn-border-color);
      background-color: var(--btn-bg-color);
      color: var(--btn-text-color);
      transition: background-color 0.3s, border-color 0.3s;
    }
    .button:hover {
      background-color: var(--btn-hover-bg-color);
      border-color: var(--btn-hover-border-color);
    }
  </style>
</head>
<body>
    <!-- ボタン群 -->
    <div class="btn-cluster">
      <!-- arXivリンク -->
      <a href="" class="button doc-link" target="_blank">
        <span class="icon is-small">
          <i class="ai ai-arxiv"></i>
        </span>
        <span>arXiv</span>
      </a>
      <!-- PDFリンク -->
      <a href="" class="button doc-link" target="_blank">
        <span class="icon is-small">
          <i class="fas fa-file-pdf"></i>
        </span>
        <span>PDF</span>
      </a>
      <!-- コード参照 -->
      <a href="" class="button code-btn" target="_blank">
        <span class="icon is-small">
          <i class="fab fa-github"></i>
        </span>
        <span>Code</span>
      </a>
    </div>
</body>
</html>
