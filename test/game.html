<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ゲーム</title>
  <style>
    /* —— 基本レイアウト —— */
    body { font-family: Arial, sans-serif; margin: 0; }
    #filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: center; padding: 20px;
    }

    /* —— ボタン —— */
    #filter-bar button {
      padding: 10px 16px; border: none; cursor: pointer;
      border-radius: 4px; background: #4e54c8; color: #fff;
      transition: background .3s;
    }
    #filter-bar button:hover,
    #filter-bar button.active { background: #8f94fb; }

    /* —— アルバム —— */
    .album {
      display: grid; gap: 15px; padding: 0 20px 40px;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }
    .album img {
      width: 100%; height: 300px; object-fit: cover;
      border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,.2);
      transition: transform .3s;
    }
    .album img:hover { transform: scale(1.03); }

    /* —— 非表示用 —— */
    .hidden { display: none; }
  </style>
</head>

<body>
  <!-- ===== フィルターボタン ===== -->
  <div id="filter-bar">
    <button data-genre="all" class="active">All</button>
    <button data-genre="consumer">Consumer</button>
    <button data-genre="online">Online</button>
  </div>

  <!-- ===== 画像アルバム ===== -->
  <div class="album" id="album">
    <!-- ※サンプル用。src を任意の画像パスに置き換えてください -->
    <img src="https://www.nintendo.com/jp/zelda/totk/sns.png"  alt=""  data-genre="consumer">
    <img src="https://mameblooog.com/wp-content/uploads/2024/05/ff7rebirth-768x432.jpeg"    alt=""    data-genre="consumer">
    <img src="https://www.residentevil.com/4/jp/_asset/images/bio4-share-ja.png"  alt=""  data-genre="consumer">
    <img src="https://image.api.playstation.com/vulcan/img/rnd/202010/2701/vIsYOzibTrdOQ7Yt0IkwN1Fh.png" data-genre="consumer">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLvb4AB72LaDQff4ndeD95xPMJDStqDudrnA&s" data-genre="consumer">
    <img src="https://www.nintendo.com/jp/switch/a99pa/sns.png" data-genre="consumer">
    <img src="https://eccdn.geo-online.co.jp/ec_media_images/5043010-01.jpg" data-genre="consumer">
    <img src="https://shared.cloudflare.steamstatic.com/store_item_assets/steam/apps/834530/capsule_616x353_japanese.jpg?t=1741324846" data-genre="consumer">
    <img src="https://m.media-amazon.com/images/I/91Tt4OOazFL.jpg" data-genre="consumer">
    <img src="https://www.capcom-games.com/product/wp-content/uploads/sites/3/2021/08/product_monsterhunterportable3rd_thumb.jpg" data-genre="consumer">
    <img src="https://images.ctfassets.net/0p36cwysl0ad/66VrrDfaVZkqbwZ0NxJzYR/de5143862b99b1a14d11a7465c982fe0/apex-legends-listing-thumb-01-ps4-en-29oct20.webp"  alt=""  data-genre="online">
    <img src="https://www.nintendo.com/jp/switch/av5ja/assets/images/index/pc/movie/img_intro.jpg"    alt=""    data-genre="online">
    <img src="https://www.riotgames.com/darkroom/2880/8d5c497da1c2eeec8cffa99b01abc64b:6066e0c7a72429cb3e6f1de9afe5fe21/ps-f2p-val-console-launch-16x9.jpg"  alt=""  data-genre="online">
    <img src="https://bijo-esports.com/wp-content/uploads/2019/11/overwatch.jpg" data-genre="online">
    <img src="https://gakusei-majan.com/img/jantama.png" data-genre="online"

    <!-- さらに追加可能 -->
  </div>

  <!-- ===== フィルタースクリプト ===== -->
  <script>
    const buttons = document.querySelectorAll('#filter-bar button');
    const images  = document.querySelectorAll('#album img');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        // アクティブボタンの調整
        document.querySelector('#filter-bar button.active')
                .classList.remove('active');
        btn.classList.add('active');

        // ジャンルフィルタ
        const genre = btn.dataset.genre;
        images.forEach(img => {
          if (genre === 'all' || img.dataset.genre === genre) {
            img.classList.remove('hidden');
          } else {
            img.classList.add('hidden');
          }
        });
      });
    });
  </script>
  <style>
    body {
    background: -moz-linear-gradient(45deg, #02e1ba 0%, #26c9f2 29%, #d911f2 66%, #ffa079 100%);
    background: -webkit-linear-gradient(45deg, #02e1ba 0%,#26c9f2 29%,#d911f2 66%,#ffa079 100%);
    background: linear-gradient(45deg, #02e1ba 0%,#26c9f2 29%,#d911f2 66%,#ffa079 100%);
    background-size: 400% 400%;
    -webkit-animation: Gradient 15s ease infinite;
	-moz-animation: Gradient 15s ease infinite;
	animation: Gradient 15s ease infinite;
	/*min-height: calc(100vh - 2rem);*/
	display: flex;
	flex-direction: column;
	align-items: stretch;
	justify-content: space-evenly;
	overflow: hidden;
	position: relative; 
}

body::before, 
body::after {
	content: "";
	width: 70vmax;
	height: 70vmax;
	position: absolute;
	background: rgba(255, 255, 255, 0.07);
	left: -20vmin;
	top: -20vmin;
	animation: morph 15s linear infinite alternate, spin 20s linear infinite;
	z-index: 1;
	will-change: border-radius, transform;
	transform-origin: 55% 55%;
	pointer-events: none; 
}
	
body::after {
    width: 70vmin;
    height: 70vmin;
    left: auto;
    right: -10vmin;
    top: auto;
    bottom: 0;
    animation: morph 10s linear infinite alternate, spin 26s linear infinite reverse;
    transform-origin: 20% 20%; 
}

@-webkit-keyframes Gradient {
	0% {
		background-position: 0 50%
	}
	50% {
		background-position: 100% 50%
	}
	100% {
		background-position: 0 50%
	}
}

@-moz-keyframes Gradient {
	0% {
		background-position: 0 50%
	}
	50% {
		background-position: 100% 50%
	}
	100% {
		background-position: 0 50%
	}
}

@keyframes Gradient {
	0% {
		background-position: 0 50%
	}
	50% {
		background-position: 100% 50%
	}
	100% {
		background-position: 0 50%
	}
}

@keyframes morph {
  0% {
    border-radius: 40% 60% 60% 40% / 70% 30% 70% 30%; }
  100% {
    border-radius: 40% 60%; } 
}

@keyframes spin {
  to {
    transform: rotate(1turn); 
  } 
}
	.st0{display:none;}
	.st1{display:inline;}

  </style>
</body>
</html>
