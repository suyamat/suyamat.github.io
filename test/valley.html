<!DOCTYPE html>
<html lang="ja">
  <head>

    <!-- Bootstrap 5 CSS -->
    <link

    <!-- 自作スタイル -->
    <link rel="stylesheet" href="valley.css" />
  </head>

  <body>

    <div class="area">

        <li></li><li></li><li></li><li></li><li></li>

    <!-- 通常コンテンツ -->
    <div class="context">
      <nav class="navbar navbar-expand-xl navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">松山 卓矢</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarBasic"
            aria-controls="navbarBasic"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarBasic">
            <ul class="navbar-nav me-auto mb-2 mb-xl-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"
                  >バレーボール</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="game.html">ゲーム</a>
              </li>
            </ul>

            <form class="d-flex">
              <input
                class="form-control me-2"
                type="search"

                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>

      <div class="card my-4">
        <div class="card-header">好きな理由</div>
        <div class="card-body">
          <ul class="mb-0">
            <li>小学校から大学までやっていました。</li>
            <li>
              <span>&lt;プレイする側として&gt;</span>スパイクを決める時の爽快感
            </li>
            <li>
              <span>&lt;見る側として&gt;</span>ボールが落ちるまでのハラハラ感
            </li>
          </ul>
        </div>

        <div class="card-body">
          <h5 class="card-title">大塚達宣 選手</h5>

          <div id="myCarousel" class="carousel slide">

              <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
              <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>

            <div class="carousel-inner">
              <div class="carousel-item active">
                <img src="https://www.getsuvolley.com/valley-wp/wp-content/uploads/2023/07/%E5%A4%A7%E5%A1%9A%E9%81%94%E5%AE%A3%EF%BC%88%E6%97%A5%E6%9C%AC%E4%BB%A3%E8%A1%A8%EF%BC%89%E3%80%90%E5%86%99%E7%9C%9F%EF%BC%9AFIVB%E3%80%91-scaled.jpeg" class="d-block w-100" alt="">
              </div>
              <div class="carousel-item">
                <img src="https://vbm.link/v/wp-content/uploads/2022/01/sspikeIMG_1671.jpg" class="d-block w-100" alt="">
              </div>
              <div class="carousel-item">
                <img src="https://www.getsuvolley.com/valley-wp/wp-content/uploads/2024/06/Ph001%E5%A4%A7%E5%A1%9A%E9%81%94%E5%AE%A3%EF%BC%88%E3%81%8A%E3%81%8A%E3%81%A4%E3%81%8B%E3%83%BB%E3%81%9F%E3%81%A4%E3%81%AE%E3%82%8A%EF%BC%8F%E8%BA%AB%E9%95%B7194%E3%8E%9D%EF%BC%8F%E6%9C%80%E9%AB%98%E5%88%B0%E9%81%94%E7%82%B9338%E3%8E%9D%EF%BC%8F%E3%80%90%E5%86%99%E7%9C%9F%EF%BC%9A%E5%9D%82%E5%8F%A3%E5%8A%9F%E5%B0%86%E3%80%91-scaled.jpg" class="d-block w-100" alt="">

            </div>

              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">前へ</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">次へ</span>
            </button>
