<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>自己紹介 | 松山 卓矢</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;700&display=swap" rel="stylesheet" />

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="valley.css" />
  </head>

  <body>
    <!-- ===== 背景グラデーション（固定） ============================ -->
    <div class="bg-gradient" aria-hidden="true"></div>

    <!-- ===== ヘッダー + 波アニメーション =========================== -->
    <header class="wave-header">
      <nav class="navbar navbar-expand-xl bg-transparent py-3">
        <div class="container">
          <a class="navbar-brand fw-bold text-white" href="#">松山 卓矢</a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                  data-bs-target="#navbarBasic" aria-controls="navbarBasic"
                  aria-expanded="false" aria-label="メニューを開閉">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarBasic">
            <ul class="navbar-nav me-auto">
              <li class="nav-item"><a class="nav-link active text-white fw-semibold" href="#">バレーボール</a></li>
              <li class="nav-item"><a class="nav-link text-white fw-semibold" href="game.html">ゲーム</a></li>
            </ul>

            <form class="d-flex" role="search">
              <input class="form-control me-2" type="search" placeholder="Search" aria-label="検索" />
              <button class="btn btn-outline-light fw-semibold" type="submit">Search</button>
            </form>
          </div>
        </div>
      </nav>

      <div class="inner-header flex-column text-white">
        <h1 class="display-5 fw-bold mb-0">自己紹介 | 松山 卓矢</h1>
      </div>

      <!-- SVG Waves -->
      <svg class="waves" xmlns="http://www.w3.org/2000/svg"
           viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
          <path id="gentle-wave"
                d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="parallax">
          <use xlink:href="#gentle-wave" x="48" y="0"  fill="rgba(255,255,255,0.6)" />
          <use xlink:href="#gentle-wave" x="48" y="3"  fill="rgba(255,255,255,0.4)" />
          <use xlink:href="#gentle-wave" x="48" y="5"  fill="rgba(255,255,255,0.2)" />
          <use xlink:href="#gentle-wave" x="48" y="8"  fill="#fff" />
        </g>
      </svg>
    </header>

<!-- ===== メインコンテンツ ===================================== -->
<main class="container-fluid py-5">
    <div class="mx-auto content-wrapper">
  
      <!-- ===== 好きなことカード =============================== -->
      <section class="card glass border-0 mb-5">
        <header class="card-header card-title">好きなこと</header>
        <div class="card-body px-4">
          <h2 class="sub-heading">バレーボール</h2>
          <ul class="stylish-list">
            <li>小学校から大学まで続けていました。</li>
          </ul>
        </div>
      </section>
  
      <!-- ===== 好きな理由カード =============================== -->
      <section class="card glass border-0 mb-5">
        <header class="card-header card-title">好きな理由</header>
        <div class="card-body px-4">
          <ul class="stylish-list">
            <li><strong>&lt;プレイする側として&gt;</strong> スパイクを決める時の爽快感</li>
            <li><strong>&lt;見る側として&gt;</strong> ボールが落ちるまでのハラハラ感</li>
          </ul>
        </div>
      </section>
  
      <!-- ===== 好きな選手カード =============================== -->
      <section class="card glass border-0">
        <header class="card-header card-title">好きな選手</header>
  
        <div class="card-body px-4">
          <h2 class="sub-heading mb-4">大塚達宣 選手</h2>
            <ul class="stylish-list">
                <li>日本代表</li>
                <li>同級生で、中学校の時に一度対戦</li>
            </ul>
          <!-- カルーセル -->
          <div id="playerCarousel" class="carousel slide mx-auto" style="max-width: 600px">
            <div class="carousel-indicators">
              <button type="button" data-bs-target="#playerCarousel" data-bs-slide-to="0"
                      class="active" aria-label="Slide 1"></button>
              <button type="button" data-bs-target="#playerCarousel" data-bs-slide-to="1"
                      aria-label="Slide 2"></button>
              <button type="button" data-bs-target="#playerCarousel" data-bs-slide-to="2"
                      aria-label="Slide 3"></button>
            </div>

            <div class="carousel-inner rounded-4 overflow-hidden">
              <div class="carousel-item active">
                <img src="https://www.getsuvolley.com/valley-wp/wp-content/uploads/2023/07/%E5%A4%A7%E5%A1%9A%E9%81%94%E5%AE%A3%EF%BC%88%E6%97%A5%E6%9C%AC%E4%BB%A3%E8%A1%A8%EF%BC%89%E3%80%90%E5%86%99%E7%9C%9F%EF%BC%9AFIVB%E3%80%91-scaled.jpeg"
                     class="d-block w-100 object-fit-cover" alt="試合中の大塚選手" loading="lazy">
              </div>
              <div class="carousel-item">
                <img src="https://vbm.link/v/wp-content/uploads/2022/01/sspikeIMG_1671.jpg"
                     class="d-block w-100 object-fit-cover" alt="スパイクを打つ大塚選手" loading="lazy">
              </div>
              <div class="carousel-item">
                <img src="https://www.getsuvolley.com/valley-wp/wp-content/uploads/2024/06/Ph001%E5%A4%A7%E5%A1%9A%E9%81%94%E5%AE%A3%EF%BC%88%E3%81%8A%E3%81%8A%E3%81%A4%E3%81%8B%E3%83%BB%E3%81%9F%E3%81%A4%E3%81%AE%E3%82%8A%EF%BC%8F%E8%BA%AB%E9%95%B7194%E3%8E%9D%EF%BC%8F%E6%9C%80%E9%AB%98%E5%88%B0%E9%81%94%E7%82%B9338%E3%8E%9D%EF%BC%8F%E3%80%90%E5%86%99%E7%9C%9F%EF%BC%9A%E5%9D%82%E5%8F%A3%E5%8A%9F%E5%B0%86%E3%80%91-scaled.jpg"
                     class="d-block w-100 object-fit-cover" alt="笑顔の大塚選手" loading="lazy">
              </div>
            </div>

            <button class="carousel-control-prev" type="button"
                    data-bs-target="#playerCarousel" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">前へ</span>
            </button>
            <button class="carousel-control-next" type="button"
                    data-bs-target="#playerCarousel" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">次へ</span>
            </button>
          </div>
          </div>
        </div>
      </section>
  
    </div>
  </main>
  

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
